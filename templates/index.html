<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Universitario</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
    <div class="app" id="app">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" onclick="location.reload()">
                <div class="logo-icon">🎓</div>
                <div class="logo-text">Gestor<span class="logo-accent">Uni</span></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-header">
                    <span>Materias</span>
                    <button class="btn-add" onclick="showSubjectModal()" title="Nueva materia">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                </div>
                <ul id="subject-list" class="subject-list"></ul>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-btn" onclick="showCloudSyncModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-4V6a2 2 0 0 0-4 0v4H6a2 2 0 0 0 0 4h4v4a2 2 0 0 0 4 0v-4h4a2 2 0 0 0 0-4z"/></svg>
                    Nube
                </button>
                <button class="sidebar-btn" onclick="showExportModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Exportar
                </button>
                <button class="sidebar-btn" onclick="showBackupRestoreModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.8 1 6.5 2.7M21 3v6h-6"/></svg>
                    Restaurar
                </button>
            </div>
        </aside>

        <main class="main-content" id="main-content">
            <div class="mobile-header" id="mobile-header">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <span class="mobile-title" id="mobile-title">Gestor Universitario</span>
            </div>
            <div class="welcome-state" id="welcome-state">
                <div class="welcome-illustration">
                    <div class="welcome-icon-wrap">
                        <span class="welcome-emoji">📚</span>
                    </div>
                    <div class="welcome-particles">
                        <span class="particle" style="--x:1;--y:-1;--d:2s">✏️</span>
                        <span class="particle" style="--x:-1;--y:1;--d:2.5s">🧠</span>
                        <span class="particle" style="--x:1;--y:1;--d:3s">💡</span>
                        <span class="particle" style="--x:-1;--y:-1;--d:1.8s">📝</span>
                    </div>
                </div>
                <h2>Tu universidad, organizada</h2>
                <p>Centraliza notas, transcripciones y tareas. Con análisis de IA integrado.</p>
                <button class="btn btn-primary btn-lg" onclick="showSubjectModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    Crear primera materia
                </button>
            </div>

            <div class="subject-view hidden" id="subject-view">
                <div class="subject-view-header" id="subject-view-header"></div>
                <div class="tabs" id="tabs">
                    <button class="tab active" data-tab="sessions" onclick="switchTab('sessions')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        Encuentros
                    </button>
                    <button class="tab" data-tab="tasks" onclick="switchTab('tasks')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
                        Tareas
                        <span class="tab-badge hidden" id="tasks-badge">0</span>
                    </button>
                    <button class="tab" data-tab="flashcards" onclick="switchTab('flashcards')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 9v6M9 12h6"/></svg>
                        Flashcards
                    </button>
                    <button class="tab" data-tab="ai" onclick="switchTab('ai')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93L12 22l-.75-12.07A4.001 4.001 0 0 1 12 2z"/></svg>
                        IA
                    </button>
                    <button class="tab" data-tab="export" onclick="switchTab('export')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Exportar
                    </button>
                </div>
                <div class="tab-content" id="tab-content"></div>
            </div>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" id="modal-box"></div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/script.js"></script>
</body>
</html>
